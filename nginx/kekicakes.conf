server {
    listen 80;
    server_name kekicakes.co.ke www.kekicakes.co.ke;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kekicakes.co.ke www.kekicakes.co.ke;

    # SSL (update paths after running certbot)
    ssl_certificate /etc/letsencrypt/live/kekicakes.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kekicakes.co.ke/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Static files (collected by collectstatic)
    location /static/ {
        alias /home/kekicakes/KekiCakes/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (uploaded images)
    location /media/ {
        alias /home/kekicakes/KekiCakes/media/;
        expires 7d;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://unix:/run/kekicakes.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}
