{# HTMX partial shown after STK push is sent – polls payment status every 3s #}
<div
  id="payment-polling"
  class="text-center py-6"
  hx-get="{% url 'payments:status' order.pk %}"
  hx-trigger="every 3s"
  hx-target="#payment-polling"
  hx-swap="outerHTML"
>
  <div class="flex flex-col items-center gap-4">
    <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center">
      <svg class="w-8 h-8 text-green-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
      </svg>
    </div>
    <div>
      <p class="font-semibold text-espresso">M-Pesa prompt sent!</p>
      <p class="text-sm text-brown mt-1">Check your phone and enter your M-Pesa PIN to complete payment.</p>
    </div>
    <div class="flex items-center gap-2 text-sm text-brown">
      <div class="w-3 h-3 border-2 border-rose border-t-transparent rounded-full animate-spin"></div>
      Waiting for payment confirmation...
    </div>
  </div>
</div>
