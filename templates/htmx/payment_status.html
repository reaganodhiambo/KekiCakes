{# HTMX payment status partial – returned by PaymentStatusView #}
{% if status == 'success' %}
<div hx-trigger="load" hx-get="" hx-push-url="{% url 'payments:success' order.pk %}">
  <script>window.location.href = "{% url 'payments:success' order.pk %}";</script>
</div>
{% elif status in 'failed,timeout,cancelled' %}
<div class="text-center py-4">
  <svg class="w-12 h-12 text-red-500 inline mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  <p class="font-semibold text-red-700">Payment failed or was cancelled.</p>
  <a href="{% url 'payments:initiate' order.pk %}" class="btn-primary mt-4 inline-block">Try Again</a>
</div>
{% else %}
{# Still pending – keep polling #}
<div id="payment-status"
  hx-get="{% url 'payments:status' order.pk %}"
  hx-trigger="every 3s"
  hx-target="#payment-status"
  hx-swap="outerHTML"
  class="text-center text-sm text-brown py-2 flex items-center justify-center gap-2"
>
  <div class="w-3 h-3 border-2 border-rose border-t-transparent rounded-full animate-spin"></div>
  Waiting for confirmation...
</div>
{% endif %}
