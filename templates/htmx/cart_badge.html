{# Cart badge – replaces the "Cart" text with item count after HTMX add #}
<span id="cart-count" class="font-semibold">
  {% with cart|length as count %}
  {% if count > 0 %}
    Cart ({{ count }})
  {% else %}
    Cart
  {% endif %}
  {% endwith %}
</span>

<span id="mobile-cart-badge" hx-swap-oob="outerHTML:#mobile-cart-badge" class="absolute -top-1 -right-2 bg-rose text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full">
  {{ cart|length }}
</span>
