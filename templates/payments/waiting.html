{% extends 'base.html' %}
{% block title %}Waiting for Payment – Keki Cakes{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-20 text-center">
  <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-8 animate-pulse">
    <svg class="w-12 h-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
    </svg>
  </div>
  <h1 class="font-display font-bold text-3xl text-espresso mb-3">Awaiting Payment</h1>
  <p class="text-brown mb-2">Enter your M-Pesa PIN on your phone to complete the payment.</p>
  <p class="text-sm text-brown/70 mb-10">Order #{{ order.pk }} · KES {{ order.total|floatformat:"0" }}</p>

  <!-- Auto-refreshing status -->
  <div id="payment-status"
    hx-get="{% url 'payments:status' order.pk %}"
    hx-trigger="every 3s"
    hx-target="#payment-status"
    hx-swap="outerHTML"
    class="flex items-center justify-center gap-2 text-sm text-brown"
  >
    <div class="w-3 h-3 border-2 border-rose border-t-transparent rounded-full animate-spin"></div>
    Checking payment status...
  </div>
</div>
{% endblock %}
