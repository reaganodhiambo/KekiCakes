{% extends 'base.html' %}
{% block title %}Payment Failed – Keki Cakes{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-20 text-center">
  <div class="w-24 h-24 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-8">
    <svg class="w-12 h-12 text-red-500 inline mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
  </div>

  <h1 class="font-display font-bold text-4xl text-espresso mb-3">Payment Failed</h1>
  <p class="text-brown text-lg mb-8 leading-relaxed">
    The M-Pesa payment was cancelled, failed, or timed out. No amount was deducted.
  </p>

  <div class="flex flex-col sm:flex-row gap-4 justify-center">
    <a href="{% url 'payments:initiate' order.pk %}" class="btn-primary px-8 py-4">
      🔄 Try Again
    </a>
    <a href="{{ whatsapp_url }}" target="_blank" class="btn-whatsapp px-8 py-4">
       Order via WhatsApp
    </a>
  </div>

  <a href="{% url 'orders:cart' %}" class="block mt-6 text-sm text-rose hover:text-rose-dark transition-colors">
    ← Return to Cart
  </a>
</div>
{% endblock %}
